<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Paleta de colores — theme.ts</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        margin: 24px;
        background: #f7f7f7;
        color: #0f172a;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 8px;
      }
      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
      .panel {
        background: #fff;
        border-radius: 8px;
        padding: 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .swatches {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
        margin-top: 12px;
      }
      .swatch {
        height: 84px;
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 8px;
        color: #fff;
        font-weight: 600;
        box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.05);
      }
      .label {
        font-size: 12px;
        opacity: 0.95;
      }
      .hex {
        font-size: 12px;
        opacity: 0.85;
        margin-top: 6px;
        font-weight: 500;
      }
      footer {
        margin-top: 18px;
        font-size: 13px;
        color: #475569;
      }
      @media (max-width: 800px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Vista previa de la paleta exportada desde <strong>theme.ts</strong></h1>
    <div class="container">
      <div class="panel">
        <strong>Light Theme</strong>
        <div id="light" class="swatches"></div>
        <footer>Muestra de fondo: <span id="light-bg"></span></footer>
      </div>
      <div class="panel">
        <strong>Dark Theme</strong>
        <div id="dark" class="swatches"></div>
        <footer>Muestra de fondo: <span id="dark-bg"></span></footer>
      </div>
    </div>

    <script>
      // Colores extraídos manualmente desde src/UI/theme.ts
      const lightTheme = {
        bg: "#f8fafc",
        bgCard: "#ffffff",
        bgSidebar: "#f1f5f9",
        textPrimary: "#0f172a",
        textSecondary: "#475569",
        textMuted: "#94a3b8",
        primary: "#22c55e",
        primaryHover: "#166534",
        accentBg: "#e2e8f0",
        accentText: "#0f172a",
        danger: "#ef4444",
        dangerHover: "#b91c1c",
        dangerText: "#ffffff",
        border: "#e2e8f0",
      };

      const darkTheme = {
        bg: "#235662",
        bgCard: "#1e293b",
        bgSidebar: "#0f172a",
        textPrimary: "#f8fafc",
        textSecondary: "#94a3b8",
        textMuted: "#64748b",
        primary: "#22c55e",
        primaryHover: "#4ade80",
        accentBg: "#334155",
        accentText: "#f8fafc",
        danger: "#f87171",
        dangerHover: "#ef4444",
        dangerText: "#0f172a",
        border: "#334155",
      };

      function luminance(hex) {
        const c = hex.replace("#", "");
        const r = parseInt(c.substring(0, 2), 16) / 255;
        const g = parseInt(c.substring(2, 4), 16) / 255;
        const b = parseInt(c.substring(4, 6), 16) / 255;
        const a = [r, g, b].map((v) =>
          v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4),
        );
        return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
      }

      function textColorFor(hex) {
        return luminance(hex) > 0.5 ? "#0f172a" : "#ffffff";
      }

      function render(theme, containerId, bgSpanId) {
        const container = document.getElementById(containerId);
        const bgSpan = document.getElementById(bgSpanId);
        bgSpan.textContent = theme.bg;
        for (const key of Object.keys(theme)) {
          const div = document.createElement("div");
          div.className = "swatch";
          const hex = theme[key];
          div.style.background = hex;
          const label = document.createElement("div");
          label.className = "label";
          label.textContent = key;
          const hexEl = document.createElement("div");
          hexEl.className = "hex";
          hexEl.textContent = hex;
          const sample = document.createElement("div");
          sample.style.marginTop = "6px";
          sample.style.fontSize = "13px";
          sample.textContent = "Aa";
          // pick contrasting text color
          const tc = textColorFor(hex);
          div.style.color = tc;
          div.appendChild(label);
          div.appendChild(hexEl);
          div.appendChild(sample);
          container.appendChild(div);
        }
      }

      render(lightTheme, "light", "light-bg");
      render(darkTheme, "dark", "dark-bg");
    </script>
  </body>
</html>
